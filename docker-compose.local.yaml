services:
  mongo-local:
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo-local-data:/data/db

  api-local:
    build:
      context: .
      target: backend-prod
    restart: unless-stopped
    depends_on:
      mongo-local:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: 5000
    expose:
      - "5000"
    volumes:
      - uploads-local-data:/app/uploads

  web-local:
    build:
      context: .
      target: frontend-prod
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - api-local
    ports:
      - "127.0.0.1:8080:80"

volumes:
  mongo-local-data:
  uploads-local-data:
